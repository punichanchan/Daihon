/* ===== メールボックス ===== */
/* 未読数バッジの更新（受信中の申請・招待＋未読お知らせ） */
window.updateMailBadge = function() {
  const badge = eid('mailBadge'); if(!badge) return;
  const box = window.inbox || { friendIn:[], shareIn:[], notices:[] };
  const count = box.friendIn.length + box.shareIn.length + box.notices.filter(n => n.unread).length;
  badge.textContent = count > 99 ? '99+' : String(count);
  badge.style.display = count > 0 ? 'block' : 'none';
};

window.openMailbox = function() {
  window.mailboxOpen = true;
  window.shareModalScriptId = null;
  renderMailbox();
  /* 開いたらお知らせを既読にする */
  (window.inbox.notices || []).forEach(n => n.unread = false);
  window.updateMailBadge();
};

window.renderMailboxIfOpen = function() {
  if(window.mailboxOpen) renderMailbox();
};

function renderMailbox() {
  const box = window.inbox;
  let html = '';

  /* 届いたフレンド申請 */
  html += '<div class="mail-section"><i class="ti ti-user-plus"></i> 届いたフレンド申請</div>';
  if(box.friendIn.length) {
    html += box.friendIn.map(r => `
      <div class="mail-item">
        <span class="mi-text"><strong>${escH(r.fromName)}</strong> さんからフレンド申請</span>
        <span class="mi-actions">
          <button class="bs ac-add" onclick="approveFriendRequest('${r.id}')"><i class="ti ti-check"></i> 承認</button>
          <button class="bs ac-danger" onclick="rejectFriendRequest('${r.id}')"><i class="ti ti-x"></i> 拒否</button>
        </span>
      </div>`).join('');
  } else {
    html += '<p style="font-size:11px;color:var(--text-muted);padding:4px 6px;text-align:left;">なし</p>';
  }

  /* 届いた共同編集の招待 */
  html += '<div class="mail-section"><i class="ti ti-share"></i> 届いた共同編集の招待</div>';
  if(box.shareIn.length) {
    html += box.shareIn.map(inv => `
      <div class="mail-item">
        <span class="mi-text"><strong>${escH(inv.ownerName)}</strong> さんが「${escH(truncTitle(inv.scriptTitle))}」の共同編集に招待しています</span>
        <span class="mi-actions">
          <button class="bs ac-add" onclick="approveShareInvite('${inv.id}')"><i class="ti ti-check"></i> OK</button>
          <button class="bs ac-danger" onclick="declineShareInvite('${inv.id}')"><i class="ti ti-x"></i> 断る</button>
        </span>
      </div>`).join('');
  } else {
    html += '<p style="font-size:11px;color:var(--text-muted);padding:4px 6px;text-align:left;">なし</p>';
  }

  /* 送信済み（申請中・招待中） */
  if(box.friendOut.length || box.shareOut.length) {
    html += '<div class="mail-section"><i class="ti ti-clock"></i> 送信済み（相手の返事待ち）</div>';
    html += box.friendOut.map(r => `
      <div class="mail-item">
        <span class="mi-text" style="color:var(--text-muted);">${escH(r.toName)} さんにフレンド申請中</span>
        <button class="bs" onclick="cancelFriendRequest('${r.id}')">取消</button>
      </div>`).join('');
    html += box.shareOut.map(inv => `
      <div class="mail-item">
        <span class="mi-text" style="color:var(--text-muted);">${escH(inv.toName)} さんに「${escH(truncTitle(inv.scriptTitle))}」の招待中</span>
        <button class="bs" onclick="cancelShareInvite('${inv.id}')">取消</button>
      </div>`).join('');
  }

  /* お知らせ */
  html += '<div class="mail-section"><i class="ti ti-bell"></i> お知らせ</div>';
  if(box.notices.length) {
    html += box.notices.map(n => {
      const t = new Date(n.at).toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
      return `<div class="mail-notice">${escH(n.text)}<span class="mn-time">${t}</span></div>`;
    }).join('');
  } else {
    html += '<p style="font-size:11px;color:var(--text-muted);padding:4px 6px;text-align:left;">お知らせはありません</p>';
  }

  eid('main').innerHTML = `
  <div class="modal-overlay">
    <div class="modal-box" style="max-width: 460px;">
      <h3><i class="ti ti-mail" style="color:var(--text-accent)"></i> メールボックス</h3>
      <p class="modal-sub">フレンド申請・共同編集の招待・お知らせがリアルタイムで届きます</p>
      ${html}
      <div class="modal-actions" style="margin-top:16px;">
        <button class="act-btn" onclick="closeMailbox()">閉じる</button>
      </div>
    </div>
  </div>`;
}

window.closeMailbox = function() {
  window.mailboxOpen = false;
  if(window.activeId) openProject(window.activeId); else renderEmpty();
};

/* トースト通知（画面右上に4秒表示） */
window.showToast = function(msg) {
  const area = eid('toastArea'); if(!area) return;
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  area.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; }, 3600);
  setTimeout(() => { t.remove(); }, 4000);
};

/* ===== 作品の共有設定（招待制） ===== */
window.openShareModal = function() {
  const p = window.projects.find(x => String(x.id) === String(window.activeId));
  if(!p) return;
  if(!p.sharedWith) p.sharedWith = [];
  window.mailboxOpen = false;
  window.shareModalScriptId = p.id;

  eid('main').innerHTML = `
  <div class="modal-overlay">
    <div class="modal-box">
      <h3>作品の共有設定</h3>
      <p class="modal-sub">「${escH(truncTitle(p.title))}」の共同編集にフレンドを招待します。<br>相手がOKすると編集できるようになります。</p>
      <div id="shareListBox" style="max-height: 240px; overflow-y: auto; text-align: left; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px 10px;"></div>
      <div class="modal-actions" style="margin-top:16px;">
        <button class="act-btn ac" onclick="closeShareModal('${p.id}')">閉じる</button>
      </div>
    </div>
  </div>`;
  renderShareRows(p.id);
};

window.closeShareModal = function(pid) {
  window.shareModalScriptId = null;
  openProject(pid);
};

/* 共有設定の行を描画（共有中／招待中／未招待の3状態） */
function renderShareRows(scriptId) {
  const box = eid('shareListBox'); if(!box) return;
  const p = window.projects.find(x => String(x.id) === String(scriptId)); if(!p) return;
  if(!p.sharedWith) p.sharedWith = [];
  if(!window.userData.friends || !window.userData.friends.length) {
    box.innerHTML = '<p style="font-size:12px;color:var(--text-muted);text-align:center;padding:10px;">共有できるフレンドがいません。</p>';
    return;
  }
  const inviteMap = window.shareInviteMapFor ? window.shareInviteMapFor(scriptId) : {};
  box.innerHTML = window.userData.friends.map(f => {
    let statusHtml;
    if(p.sharedWith.includes(f.uid)) {
      statusHtml = `<span style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <span style="font-size:10px;color:#059669;font-weight:600;">共有中</span>
        <button class="bs ac-danger" onclick="unshareFriend('${f.uid}')">解除</button>
      </span>`;
    } else if(inviteMap[f.uid]) {
      statusHtml = `<span style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <span style="font-size:10px;color:#ea580c;font-weight:600;">相手のOK待ち</span>
        <button class="bs" onclick="cancelShareInvite('${inviteMap[f.uid].id}')">取消</button>
      </span>`;
    } else {
      statusHtml = `<button class="bs ac-change" style="flex-shrink:0;" onclick="sendShareInvite('${f.uid}')"><i class="ti ti-send"></i> 招待を送る</button>`;
    }
    return `<div class="friend-item"><span style="overflow-wrap:anywhere;">${escH(f.name)}</span>${statusHtml}</div>`;
  }).join('');
}

/* 共有設定モーダルが開いていれば、リアルタイム更新に合わせて再描画 */
window.refreshShareModalIfOpen = function() {
  if(window.shareModalScriptId) renderShareRows(window.shareModalScriptId);
};

function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  eid('sidebar').classList.toggle('closed',!sidebarOpen);
  eid('sbToggleIcon').className=sidebarOpen?'ti ti-layout-sidebar-left-collapse':'ti ti-layout-sidebar-left-expand';
}

window.renderSidebar = function(){
  const list=eid('sbList');if(!list)return;list.innerHTML='';
  window.projects.forEach(p=>{
    const div=document.createElement('div');
    const isScript=p.mode==='script';
    const isShared = p.userId !== window.currentUser.uid;
    div.className='sb-item'+(isScript?' script-item':'')+(String(window.activeId)===String(p.id)?' active':'');
    const icon = isShared ? 'ti-users' : (isScript ? 'ti-file-text' : 'ti-text-size');

    div.innerHTML=`<i class="ti ${icon} sb-icon" aria-hidden="true"></i>
      <span class="sb-name">${escH(truncTitle(p.title))}</span>
      ${!isShared ? `<span class="sb-dots" onclick="openCtxMenu(event,'${p.id}')" title="編集メニュー">···</span>` : ''}`;
    div.addEventListener('click', e=>{if(!e.target.closest('.sb-dots')) openProject(p.id);});
    list.appendChild(div);
  });
}

function openCtxMenu(e,id){
  e.stopPropagation();
  ctxTargetId=id;
  const menu=eid('ctxMenu');
  menu.classList.add('open');
  const rect=e.target.getBoundingClientRect();
  const shellRect=eid('shell').getBoundingClientRect();
  menu.style.left=(rect.left-shellRect.left+20)+'px';
  menu.style.top=(rect.top-shellRect.top+20)+'px';
}
document.addEventListener('click',()=>closeCtxMenu());
function closeCtxMenu(){ const m=eid('ctxMenu'); if(m) m.classList.remove('open'); ctxTargetId=null; }

function ctxAction(action){
  const p=window.projects.find(x=>String(x.id)===String(ctxTargetId));
  closeCtxMenu();
  if(!p)return;
  if(action==='rename') openRenameModal(p);
  else if(action==='copy') copyProjectText(p);
  else if(action==='share'){
    /* 共有設定は activeId を参照するため、対象作品をアクティブにしてから開く */
    window.activeId=p.id;
    window.renderSidebar();
    updateStatBar(p);
    openShareModal();
  }
  else if(action==='delete') confirmDelete(p);
}

function openRenameModal(p){
  eid('main').innerHTML=`
  <div class="modal-overlay">
    <div class="rename-box">
      <h3 style="margin-bottom:10px">名前を変更</h3>
      <input type="text" id="renameInput" value="${escH(p.title)}" maxlength="30" style="width:100%;margin-bottom:12px">
      <div class="modal-actions">
        <button class="act-btn" onclick="openProject('${p.id}')">キャンセル</button>
        <button class="act-btn ac" onclick="doRename('${p.id}')">変更</button>
      </div>
    </div>
  </div>`;
  const inp=eid('renameInput'); inp.focus(); inp.select();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doRename(p.id);if(e.key==='Escape')openProject(p.id);});
}
function doRename(id){
  const p=window.projects.find(x=>String(x.id)===String(id));if(!p)return;
  const v=eid('renameInput');if(!v)return;
  p.title=v.value.trim()||p.title;
  if(window.dbSave) window.dbSave(p);
  window.renderSidebar();updateStatBar(p);openProject(id);
}

function copyProjectText(p){
  let text='';
  if(p.mode==='simple'){text=p.text||'';}
  /* 仮置き中の行は仮置きテキストをコピーする */
  else if(p.lines){p.lines.forEach(l=>{if(l.type==='stage')text+=`（${effText(l)}）\n`;else{const sp=p.speakers.find(s=>String(s.id)===String(l.speakerId))||p.speakers[0];text+=`${sp.name}「${effText(l)}」\n`;}});}
  navigator.clipboard.writeText(text).catch(()=>{});
}

function confirmDelete(p){
  eid('main').innerHTML=`
  <div class="modal-overlay">
    <div class="rename-box">
      <h3 style="margin-bottom:8px">「${escH(truncTitle(p.title))}」を削除しますか？</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">この操作は取り消せません。</p>
      <div class="modal-actions">
        <button class="act-btn" onclick="openProject('${p.id}')">キャンセル</button>
        <button class="act-btn" style="border-color:var(--border-danger);color:var(--text-danger)" onclick="doDelete('${p.id}')"><i class="ti ti-trash"></i> 削除する</button>
      </div>
    </div>
  </div>`;
}
function doDelete(id){
  if(window.dbDelete) window.dbDelete(id);
  window.projects=window.projects.filter(p=>String(p.id)!==String(id));
  if(String(window.activeId)===String(id))window.activeId=window.projects.length?window.projects[window.projects.length-1].id:null;
  window.renderSidebar();
  if(window.activeId)openProject(window.activeId);else renderEmpty();
}

function openNewModal(){
  newModalMode='script';
  eid('main').innerHTML=`
  <div class="modal-overlay">
    <div class="modal-box">
      <h3>新規作品</h3>
      <p class="modal-sub">モードを選んでください</p>
      <div class="mode-cards">
        <div class="mode-card sel" id="mc-script" onclick="selectNewMode('script')">
          <div class="mc-icon"><i class="ti ti-users" aria-hidden="true"></i></div>
          <h4>台本モード</h4>
          <p>話者ごとにセリフを管理</p>
        </div>
        <div class="mode-card" id="mc-simple" onclick="selectNewMode('simple')">
          <div class="mc-icon"><i class="ti ti-text-size" aria-hidden="true"></i></div>
          <h4>シンプルモード</h4>
          <p>自由入力＋文字数カウント</p>
        </div>
      </div>
      <div style="margin-bottom:1rem">
        <input type="text" id="newTitle" placeholder="作品名（例：新ネタ）" maxlength="30" style="width: 100%; padding: 6px 10px; border-radius: var(--radius); border: 0.5px solid var(--border); outline: none;">
      </div>
      <div class="modal-actions">
        <button class="act-btn" onclick="${window.projects.length?'openProject(\''+(window.activeId||window.projects[0].id)+'\')':'renderEmpty()'}">キャンセル</button>
        <button class="act-btn ac" onclick="createProject()">作成</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{const el=eid('newTitle');if(el)el.focus();},50);
}
function selectNewMode(m){
  newModalMode=m;
  ['script','simple'].forEach(x=>{const el=eid('mc-'+x);if(el)el.classList.toggle('sel',x===m);});
}
function createProject(){
  const titleEl=eid('newTitle');
  const title=(titleEl?titleEl.value.trim():'')||'無題';
  const newProjId = String(window.generateUniqueId());
  const p={id:newProjId,title,mode:newModalMode,filters:{space:true,punct:true,symbol:true,bracket:true}, sharedWith:[]};
  if(newModalMode==='script'){
    p.setupRows=[{id:String(window.generateUniqueId()),name:'',color:COLORS[0]},{id:String(window.generateUniqueId()),name:'',color:COLORS[2]}];
    p.speakers=null;p.lines=null;p.activeSpId=null;p.altMode=true;
  } else {p.text='';}
  window.projects.push(p);window.activeId=p.id;
  if(window.dbSave) window.dbSave(p);
  window.renderSidebar();updateStatBar(p);
  if(newModalMode==='script')renderSetup(p);else renderSimple(p);
}

window.openProject = function(id, fromFirebase = false){
  if (!id) return renderEmpty();
  /* ユーザー操作で作品を開いたときはメールボックス・共有設定の表示状態を解除する */
  if(!fromFirebase){ window.mailboxOpen = false; window.shareModalScriptId = null; }
  if(fromFirebase && document.activeElement && (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT')) {
    const activeP = window.projects.find(x=>String(x.id)===String(id));
    if(activeP) {
      updateStatBar(activeP);
      if(activeLineProposalId) renderProposalSidebarContent(activeP, activeLineProposalId);
    }
    return;
  }
  window.activeId=id;
  const p=window.projects.find(x=>String(x.id)===String(id));
  if(!p)return renderEmpty();
  updateStatBar(p);
  if(p.mode==='simple')renderSimple(p);
  else if(p.speakers)renderScriptEditor(p);
  else renderSetup(p);

  if(!fromFirebase && activeLineProposalId) closeProposalSidebar();
}
window.renderEmpty = function(){
  window.activeId=null;updateStatBar(null);
  eid('main').innerHTML=`<div class="empty"><div class="ei"><i class="ti ti-file-plus" aria-hidden="true"></i></div><p>左下の「新規作品」から作品を追加してください</p></div>`;
}

/* SIMPLE */
function renderSimple(p){
  eid('main').innerHTML=`
  <div class="top-bar"><span style="font-size:15px;font-weight:500;color:var(--text-primary)">${escH(p.title)}</span></div>
  <div class="filter-row">
    <span>除外：</span>
    <label><input type="checkbox" id="fSp" ${p.filters?.space?'checked':''} onchange="simFilter('${p.id}')"> 空白・改行</label>
    <label><input type="checkbox" id="fPu" ${p.filters?.punct?'checked':''} onchange="simFilter('${p.id}')"> 句読点・記号</label>
    <label><input type="checkbox" id="fSy" ${p.filters?.symbol?'checked':''} onchange="simFilter('${p.id}')"> 英数字記号</label>
    <label><input type="checkbox" id="fBr" ${p.filters?.bracket?'checked':''} onchange="simFilter('${p.id}')"> 括弧類</label>
  </div>
  <textarea class="simple-textarea" id="simTA" placeholder="ここにテキストを入力...">${escH(p.text || '')}</textarea>
  <div class="add-bar">
    <button class="act-btn" onclick="clearSim('${p.id}')"><i class="ti ti-trash" aria-hidden="true"></i> クリア</button>
  </div>`;
  const ta=eid('simTA');
  ta.addEventListener('input', e=>{p.text=e.target.value;triggerSave(p);updateStatBar(p);});
}
function simFilter(id){
  const p=window.projects.find(x=>String(x.id)===String(id));if(!p)return;
  p.filters={space:eid('fSp').checked,punct:eid('fPu').checked,symbol:eid('fSy').checked,bracket:eid('fBr').checked};
  if(window.dbSave) window.dbSave(p);
  updateStatBar(p);
}
function clearSim(id){
  const p=window.projects.find(x=>String(x.id)===String(id));if(!p)return;
  p.text='';const ta=eid('simTA');if(ta)ta.value='';if(window.dbSave) window.dbSave(p);updateStatBar(p);
}

/* SETUP */
/* 追加: 編集画面から話者設定へ安全に戻るための関数
   （現在の speakers を setupRows に反映してから設定画面を開く） */
window.openSetup = function(pid){
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p)return;
  if(p.speakers && p.speakers.length){
    p.setupRows = p.speakers.map(s=>({id:s.id, name:s.name, color:s.color}));
  }
  renderSetup(p);
};

function renderSetup(p){
  eid('main').innerHTML=`<div class="setup-wrap">
    <h3>${escH(p.title)} — 登場人物の設定</h3>
    <p class="setup-sub">名前と色を決めてください</p>
    <div id="spList"></div>
    <div style="margin-bottom:1rem">
      <button class="act-btn" onclick="addSpRow('${p.id}')"><i class="ti ti-plus" aria-hidden="true"></i> 話者を追加</button>
    </div>
    <button class="act-btn ac" onclick="startScript('${p.id}')">${p.lines && p.lines.length ? '設定を保存して台本に戻る' : '台本を書きはじめる'}</button>
  </div>`;
  renderSpRows(p);
}
function renderSpRows(p){
  const list=eid('spList');if(!list)return;list.innerHTML='';
  p.setupRows.forEach(row=>{
    const div=document.createElement('div');
    div.innerHTML=`<div class="sp-row">
      <div class="sp-dot" style="background:${row.color.bg};border:2px solid ${row.color.text}"></div>
      <input type="text" placeholder="名前（例：田中）" value="${escH(row.name)}" maxlength="10" id="sn${row.id}" style="flex:1; padding: 4px 8px; border-radius: 4px; border: 0.5px solid var(--border); outline: none;">
      ${p.setupRows.length>2?`<button class="rm-btn" onclick="rmSpRow('${p.id}','${row.id}')"><i class="ti ti-x"></i></button>`:''}
    </div>
    <div class="cdots" id="cd${row.id}"></div>`;
    list.appendChild(div);
    const dots=eid('cd'+row.id);
    COLORS.forEach(c=>{
      const d=document.createElement('div');
      d.className='cdot'+(row.color.name===c.name?' sel':'');
      d.style.background=c.bg;d.style.borderColor=row.color.name===c.name?c.text:'transparent';
      d.onclick=()=>{
        /* 入力中の名前が消えないよう、色変更前に現在値を保存 */
        p.setupRows.forEach(r=>{const el=eid('sn'+r.id);if(el)r.name=el.value;});
        row.color=c;if(window.dbSave) window.dbSave(p);renderSpRows(p);
      };
      dots.appendChild(d);
    });
    eid('sn'+row.id).addEventListener('input',e=>{row.name=e.target.value;triggerSave(p);});
  });
}
function addSpRow(pid){
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p)return;
  /* 入力中の名前が消えないよう、行追加前に現在値を保存 */
  p.setupRows.forEach(r=>{const el=eid('sn'+r.id);if(el)r.name=el.value;});
  p.setupRows.push({id:String(window.generateUniqueId()),name:'',color:COLORS[p.setupRows.length%COLORS.length]});
  if(window.dbSave) window.dbSave(p);renderSpRows(p);
}
function rmSpRow(pid,rid){
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p||p.setupRows.length<=2)return;
  p.setupRows.forEach(r=>{const el=eid('sn'+r.id);if(el)r.name=el.value;});
  p.setupRows=p.setupRows.filter(r=>String(r.id)!==String(rid));
  if(window.dbSave) window.dbSave(p);renderSpRows(p);
}
function startScript(pid){
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p)return;
  p.setupRows.forEach(r=>{const el=eid('sn'+r.id);if(el)r.name=el.value.trim();});
  p.speakers=p.setupRows.map(r=>({id:r.id,name:r.name||'話者',color:r.color}));
  /* 修正: 既存の台本があれば保持する（旧実装は毎回 lines を初期化していたため
     設定画面を開き直すたびに台本が全消去されていた） */
  if(!p.lines || !p.lines.length){
    p.lines=[{id:String(window.generateUniqueId()),type:'line',speakerId:p.speakers[0].id,text:'',proposals:[]}];
  } else {
    /* 削除された話者に紐づくセリフは先頭の話者に付け替える */
    p.lines.forEach(l=>{
      if(l.type==='line' && !p.speakers.some(s=>String(s.id)===String(l.speakerId))){
        l.speakerId=p.speakers[0].id;
      }
    });
  }
  /* アクティブ話者が消えていた場合も先頭に付け替え */
  if(!p.activeSpId || !p.speakers.some(s=>String(s.id)===String(p.activeSpId))){
    p.activeSpId=p.speakers[0].id;
  }
  if(window.dbSave) window.dbSave(p);
  renderScriptEditor(p);
}

/* SCRIPT EDITOR */
function renderScriptEditor(p){
  eid('main').innerHTML=`
  <div class="top-bar">
    <span style="font-size:15px;font-weight:500;color:var(--text-primary)">${escH(p.title)}</span>
    <button class="icon-btn" onclick="openSetup('${p.id}')"><i class="ti ti-settings" aria-hidden="true"></i> 話者設定</button>
  </div>
  <div class="filter-row">
    <span>除外：</span>
    <label><input type="checkbox" id="sfSp" ${p.filters?.space?'checked':''} onchange="scFilter('${p.id}')"> 空白・改行</label>
    <label><input type="checkbox" id="sfPu" ${p.filters?.punct?'checked':''} onchange="scFilter('${p.id}')"> 句読点・記号</label>
    <label><input type="checkbox" id="sfSy" ${p.filters?.symbol?'checked':''} onchange="scFilter('${p.id}')"> 英数字記号</label>
    <label><input type="checkbox" id="sfBr" ${p.filters?.bracket?'checked':''} onchange="scFilter('${p.id}')"> 括弧類</label>
  </div>
  <div class="speakers-bar" id="spBar"></div>
  <div class="alt-toggle">
    <input type="checkbox" id="altM" ${p.altMode?'checked':''} onchange="toggleAltMode('${p.id}', this.checked)">
    <label for="altM">追加時に話者を自動で交互に切り替える</label>
  </div>
  <div class="lines" id="linesList"></div>`;
  renderSpBar(p);renderLines(p);
}
/* 追加: altMode切替を専用関数化（インラインの長い式を整理） */
function toggleAltMode(pid, val){
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p)return;
  p.altMode=val;
  if(window.dbSave) window.dbSave(p);
}
function scFilter(pid){
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p)return;
  p.filters={space:eid('sfSp').checked,punct:eid('sfPu').checked,symbol:eid('sfSy').checked,bracket:eid('sfBr').checked};
  if(window.dbSave) window.dbSave(p);
  updateStatBar(p);
}
function renderSpBar(p){
  const bar=eid('spBar');if(!bar)return;bar.innerHTML='';
  p.speakers.forEach(s=>{
    const c=document.createElement('div');
    c.className='speaker-chip'+(String(p.activeSpId)===String(s.id)?' active':'');
    c.style.background=s.color.bg;c.style.color=s.color.text;
    c.textContent=s.name;c.onclick=()=>{p.activeSpId=s.id;if(window.dbSave) window.dbSave(p);renderSpBar(p);};
    bar.appendChild(c);
  });
}
function getNextSpId(p, targetIndex = null){
  if(!p.altMode)return p.activeSpId;
  let baseLine = null;
  if (targetIndex !== null) {
    for (let i = targetIndex; i >= 0; i--) {
      if (p.lines[i] && p.lines[i].type === 'line') { baseLine = p.lines[i]; break; }
    }
  } else {
    const ls=p.lines.filter(l=>l.type==='line');
    if(ls.length) baseLine = ls[ls.length-1];
  }
  if(!baseLine) return p.speakers[0].id;
  const idx=p.speakers.findIndex(s=>String(s.id)===String(baseLine.speakerId));
  if(idx === -1) return p.speakers[0].id;
  return p.speakers[(idx+1)%p.speakers.length].id;
}

function insertLineAfter(pid, index) {
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p)return;
  const sid=getNextSpId(p, index); p.activeSpId=sid;
  p.lines.splice(index + 1, 0, {id:String(window.generateUniqueId()),type:'line',speakerId:sid,text:'',proposals:[]});
  if(window.dbSave) window.dbSave(p);
  renderSpBar(p);renderLines(p);
  setTimeout(()=>{
    const containers = document.querySelectorAll('.line-container');
    if(containers[index + 1]) {
      const ta = containers[index + 1].querySelector('.line-text');
      if(ta) { ta.focus(); autoResizeAll(); }
    }
  },30);
}
function insertStageAfter(pid, index) {
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p)return;
  p.lines.splice(index + 1, 0, {id:String(window.generateUniqueId()),type:'stage',text:'',proposals:[]});
  if(window.dbSave) window.dbSave(p);
  renderLines(p);
  setTimeout(()=>{
    const containers = document.querySelectorAll('.line-container');
    if(containers[index + 1]) {
      const ta = containers[index + 1].querySelector('.line-text');
      if(ta) { ta.focus(); autoResizeAll(); }
    }
  },30);
}

function delLine(pid,i){
  const p=window.projects.find(x=>String(x.id)===String(pid));if(!p||p.lines.length<=1)return;
  if (confirm("この行を削除してもよろしいですか？")) {
    p.lines.splice(i,1); if(window.dbSave) window.dbSave(p); renderLines(p);
  }
}

function cycleSpk(pid,i){const p=window.projects.find(x=>String(x.id)===String(pid));if(!p)return;const l=p.lines[i];if(l.type==='stage') return;const idx=p.speakers.findIndex(s=>String(s.id)===String(l.speakerId));l.speakerId=p.speakers[(idx+1)%p.speakers.length].id;if(window.dbSave) window.dbSave(p);renderLines(p);}

let dragStartIndex = null;
function handleDragStart(e, index) { dragStartIndex = index; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function handleDragOver(e) { e.preventDefault(); }
function handleDragDrop(pid, index) {
  if (dragStartIndex === null || dragStartIndex === index) return;
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  const draggedItem = p.lines.splice(dragStartIndex, 1)[0];
  p.lines.splice(index, 0, draggedItem);
  if (window.dbSave) window.dbSave(p);
  renderLines(p); dragStartIndex = null;
}
function handleDragEnd(e) { e.currentTarget.classList.remove('dragging'); dragStartIndex = null; }

function renderLines(p){
  const list=eid('linesList');if(!list)return;list.innerHTML='';
  p.lines.forEach((l,i)=>{
    if(!l.proposals) l.proposals = [];
    const container = document.createElement('div');
    container.className = 'line-container';
    container.draggable = true;

    container.addEventListener('dragstart', (e) => handleDragStart(e, i));
    container.addEventListener('dragover', handleDragOver);
    container.addEventListener('drop', () => handleDragDrop(p.id, i));
    container.addEventListener('dragend', handleDragEnd);

    const div=document.createElement('div');
    const pCountHtml = l.proposals.length ? `<span class="badge-prop-count">${l.proposals.length}</span>` : '';
    /* 仮置き中に表示する操作ボタン群 */
    const previewBtns = l.previewOn ? `
        <span class="preview-badge"><i class="ti ti-eye"></i> 仮置き中</span>
        <button class="bs ac-change" onclick="commitPreview('${p.id}','${l.id}')" title="仮置き中のテキストを本文として確定"><i class="ti ti-check"></i> 採用</button>
        <button class="bs" onclick="clearPreview('${p.id}','${l.id}')" title="仮置きをやめて元の本文に戻す"><i class="ti ti-arrow-back-up"></i> 解除</button>` : '';

    if(l.type==='stage'){
      div.className='line stage'+(l.previewOn?' previewing':'');
      div.innerHTML=`<span class="line-speaker" style="color:var(--text-muted);font-style:italic" title="ドラッグして並び替え">ト書き</span>
        <textarea class="line-text" rows="1" placeholder="（状況説明）" style="font-style:italic;color:var(--text-secondary)">${escH(effText(l))}</textarea>`;

      const actionRow = document.createElement('div');
      actionRow.className = 'line-inline-actions';
      actionRow.innerHTML = `${previewBtns}
        <button class="bs ac-danger" onclick="delLine('${p.id}',${i})"><i class="ti ti-trash"></i> 削除</button>
        <button class="bs ac-proposal" onclick="openProposalSidebarForLine('${p.id}', '${l.id}')"><i class="ti ti-git-pull-request"></i> 修正案${pCountHtml}</button>
        <button class="bs ac-add" onclick="insertLineAfter('${p.id}',${i})"><i class="ti ti-plus"></i> セリフ追加</button>
        <button class="bs ac-add" onclick="insertStageAfter('${p.id}',${i})"><i class="ti ti-brackets"></i> ト書き</button>`;

      container.appendChild(div); container.appendChild(actionRow);
    } else {
      const sp=p.speakers.find(s=>String(s.id)===String(l.speakerId))||p.speakers[0];
      div.className='line'+(l.previewOn?' previewing':'');div.style.borderLeftWidth='3px';div.style.borderLeftColor=l.previewOn?'#ea580c':sp.color.text;
      div.innerHTML=`<span class="line-speaker" style="color:${sp.color.text}; background:${sp.color.bg}" title="ドラッグして並び替え">${escH(sp.name)}</span>
        <textarea class="line-text" rows="1" placeholder="セリフを入力...">${escH(effText(l))}</textarea>`;

      const actionRow = document.createElement('div');
      actionRow.className = 'line-inline-actions';
      actionRow.innerHTML = `${previewBtns}
        <button class="bs ac-change" onclick="cycleSpk('${p.id}',${i})" title="この行の話者を切り替え"><i class="ti ti-user-share"></i> 話者切替</button>
        <button class="bs ac-danger" onclick="delLine('${p.id}',${i})"><i class="ti ti-trash"></i> 削除</button>
        <button class="bs ac-proposal" onclick="openProposalSidebarForLine('${p.id}', '${l.id}')"><i class="ti ti-git-pull-request"></i> 修正案${pCountHtml}</button>
        <button class="bs ac-add" onclick="insertLineAfter('${p.id}',${i})"><i class="ti ti-plus"></i> セリフ追加</button>
        <button class="bs ac-add" onclick="insertStageAfter('${p.id}',${i})"><i class="ti ti-brackets"></i> ト書き</button>`;

      container.appendChild(div); container.appendChild(actionRow);
    }

    const ta=div.querySelector('textarea');
    /* 仮置き中は本文ではなく仮置きテキストの方を編集する（元の本文は保護される） */
    ta.addEventListener('input', e=>{
      if(l.previewOn){ l.previewText=e.target.value; }
      else { l.text=e.target.value; }
      triggerSave(p); autoResize(e.target); updateStatBar(p);
    });
    ta.addEventListener('keydown', e=>{
      if(e.key==='Enter' && (e.ctrlKey || e.metaKey)){ e.preventDefault(); insertLineAfter(p.id, i); }
      else if(e.key==='Enter'){ setTimeout(() => autoResize(e.target), 10); }
    });
    list.appendChild(container);
  });

  autoResizeAll();
  updateStatBar(p);
}

window.openProposalSidebarForLine = function(pid, lineId) {
  activeLineProposalId = lineId;
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  eid('proposal-sidebar').classList.add('open');
  renderProposalSidebarContent(p, lineId);
};

window.closeProposalSidebar = function() {
  eid('proposal-sidebar').classList.remove('open');
  activeLineProposalId = null;
};

function renderProposalSidebarContent(p, lineId) {
  const line = p.lines.find(l => String(l.id) === String(lineId)); if (!line) return;
  if (!line.proposals) line.proposals = [];

  const contentArea = eid('proposalSidebarContent');
  let html = `
    <button class="act-btn ac" style="width:100%; justify-content:center; display:flex; gap:6px;" onclick="addNewProposal('${p.id}', '${lineId}')">
      <i class="ti ti-plus"></i> 新しい修正案を追加
    </button>
    <div style="height:0.5px; background:var(--border); margin:4px 0;"></div>
  `;

  if (line.proposals.length === 0) {
    html += `<p style="font-size:12px; color:var(--text-muted); text-align:center; margin-top:20px;">提出された修正案はありません</p>`;
  } else {
    line.proposals.forEach((prop, index) => {
      html += `
        <div class="prop-card">
          <div class="prop-meta">
            <span>👤 ${escH(prop.userName)}</span>
            <span>${new Date(prop.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
          </div>
          <textarea class="prop-text" oninput="updateProposalText('${p.id}', '${lineId}', ${index}, this.value)">${escH(prop.text || '')}</textarea>
          <div class="prop-actions">
            <button class="bs ac-danger" style="padding:2px 6px;" onclick="deleteProposal('${p.id}', '${lineId}', ${index})" title="修正案を削除"><i class="ti ti-trash"></i></button>
            <button class="bs ac-proposal" style="padding:2px 8px;" onclick="setProposalPreview('${p.id}', '${lineId}', ${index})" title="本文を書き換えずに一時的にこの修正案を表示">
              <i class="ti ti-eye"></i> 仮置き
            </button>
            <button class="bs ac-change" style="padding:2px 8px; background:#ea580c; border-color:#ea580c; color:white;" onclick="applyProposalToLine('${p.id}', '${lineId}', ${index})">
              <i class="ti ti-check"></i> 本文を上書き
            </button>
          </div>
        </div>`;
    });
  }
  contentArea.innerHTML = html;
}

window.addNewProposal = function(pid, lineId) {
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  const line = p.lines.find(l => String(l.id) === String(lineId)); if (!line) return;

  line.proposals.push({
    text: line.text || '',
    userId: window.currentUser.uid,
    userName: window.userData.name,
    createdAt: Date.now()
  });

  window.dbSave(p);
  renderProposalSidebarContent(p, lineId);
  renderLines(p);
};

window.updateProposalText = function(pid, lineId, index, newText) {
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  const line = p.lines.find(l => String(l.id) === String(lineId)); if (!line) return;
  if (line.proposals[index]) {
    line.proposals[index].text = newText;
    triggerSave(p);
  }
};

window.deleteProposal = function(pid, lineId, index) {
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  const line = p.lines.find(l => String(l.id) === String(lineId)); if (!line) return;
  if (confirm("この修正案を削除してもよろしいですか？")) {
    line.proposals.splice(index, 1);
    window.dbSave(p);
    renderProposalSidebarContent(p, lineId);
    renderLines(p);
  }
};

/* ===== 修正案の仮置き（一時的な本文表示の差し替え） ===== */
/* 元の本文(l.text)は保持したまま、表示・文字数カウント・出力だけを仮置きテキストに切り替える */
window.setProposalPreview = function(pid, lineId, index) {
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  const line = p.lines.find(l => String(l.id) === String(lineId)); if (!line) return;
  const prop = line.proposals[index]; if (!prop) return;
  line.previewOn = true;
  line.previewText = prop.text || '';
  window.dbSave(p);
  renderLines(p);
};

/* 仮置きを解除して元の本文の表示に戻す */
window.clearPreview = function(pid, lineId) {
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  const line = p.lines.find(l => String(l.id) === String(lineId)); if (!line) return;
  line.previewOn = false;
  line.previewText = '';
  window.dbSave(p);
  renderLines(p);
};

/* 仮置き中のテキストを本文として確定する */
window.commitPreview = function(pid, lineId) {
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  const line = p.lines.find(l => String(l.id) === String(lineId)); if (!line) return;
  if (!line.previewOn) return;
  if (confirm(`仮置き中のテキストを本文として確定しますか？\n「${line.previewText || ''}」`)) {
    line.text = line.previewText || '';
    line.previewOn = false;
    line.previewText = '';
    window.dbSave(p);
    renderLines(p);
  }
};

window.applyProposalToLine = function(pid, lineId, index) {
  const p = window.projects.find(x => String(x.id) === String(pid)); if (!p) return;
  const line = p.lines.find(l => String(l.id) === String(lineId)); if (!line) return;
  const prop = line.proposals[index];
  if (!prop) return;

  if (confirm(`この修正案で本文のテキストを上書き採用しますか？\n「${prop.text}」`)) {
    line.text = prop.text;
    /* 上書き確定時は仮置き状態も解除する */
    line.previewOn = false;
    line.previewText = '';
    window.dbSave(p);
    renderLines(p);
    alert("本文を修正案に書き換えました！");
  }
};

/* ===== 出力 ===== */
/* 共通: ダウンロード処理（使用後にURLを解放） */
function downloadBlob(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

/* text出力: セリフ本文のみ。修正案は含めないが、仮置き中の行は仮置きテキストを出力。
   先頭にBOM(\uFEFF)を付与しUTF-8を明示することで、スマホ含めどの環境でも文字化けしない */
window.exportText = function(){
  const p=window.projects.find(x=>String(x.id)===String(window.activeId));if(!p)return;
  let out='';
  if(p.mode==='simple'){
    out=p.text || '';
  } else if(p.lines){
    p.lines.forEach(l=>{
      if(l.type==='stage')out+=`（${effText(l)}）\n`;
      else{const sp=p.speakers.find(s=>String(s.id)===String(l.speakerId))||p.speakers[0];out+=`${sp.name}「${effText(l)}」\n`;}
    });
  }
  const blob=new Blob(['\uFEFF'+out],{type:'text/plain;charset=utf-8'});
  downloadBlob(blob,(p.title||'テキスト')+'.txt');
};

/* Excel出力: 話者とセリフを別列に分けた .xlsx を生成。
   xlsx形式は内部的にUnicodeなので文字化けの心配がない（CSVと違いBOM対応も不要） */
window.exportExcel = function(){
  const p=window.projects.find(x=>String(x.id)===String(window.activeId));if(!p||!p.lines)return;
  if(typeof XLSX === 'undefined'){
    alert("Excel出力ライブラリの読み込みに失敗しました。通信環境を確認して再読み込みしてください。");
    return;
  }
  const rows=[['話者','セリフ']];
  p.lines.forEach(l=>{
    if(l.type==='stage'){
      rows.push(['ト書き', effText(l)]);
    } else {
      const sp=p.speakers.find(s=>String(s.id)===String(l.speakerId))||p.speakers[0];
      rows.push([sp.name, effText(l)]);
    }
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  /* 列幅をざっくり調整（話者列は狭く、セリフ列は広く） */
  ws['!cols']=[{wch:12},{wch:60}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '台本');
  XLSX.writeFile(wb,(p.title||'台本')+'.xlsx');
};
</script>
