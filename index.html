<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台本・文字数カウンターエディタ (安定版)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --surface-1: #f3f4f6; --surface-2: #ffffff;
      --border: #d1d5db; --border-strong: #9ca3af;
      --text-primary: #111827; --text-secondary: #4b5563;
      --text-muted: #9ca3af; --text-accent: #2563eb;
      --bg-accent: #eff6ff; --border-accent: #bfdbfe;
      --radius: 8px;
      --font-sans: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      --text-danger: #ef4444; --bg-danger: #fee2e2; --border-danger: #fecaca;
    }
    
    *{box-sizing:border-box;margin:0;padding:0}
    
    /* ✨ 変更点: 画面全体のスクロールを無効化し、bodyをFlexコンテナにする */
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: var(--font-sans);
      background: #f9fafb;
      display: flex;
      flex-direction: column;
    }
    
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }

    /* ✨ 変更点: auth-container も画面サイズにフィットさせる */
    .auth-container { display: flex; align-items: center; justify-content: center; height: 100%; overflow-y: auto; padding: 20px; }
    .auth-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .auth-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
    .auth-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
    .btn-google { background: #fff; color: #757575; border: 0.5px solid var(--border); padding: 10px 16px; border-radius: var(--radius); font-weight: 500; font-size: 14px; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.2s; }
    .btn-google:hover { background: var(--surface-1); }

    #app-content { display: none; flex-direction: column; flex: 1; min-height: 0; }
    #statbar{display:flex;align-items:center;gap:8px 12px;padding:7px 14px;background:var(--surface-1);border-bottom:0.5px solid var(--border);font-size:13px;flex-shrink:0;flex-wrap:wrap}
    #statbar .sb-proj{font-weight:500;color:var(--text-primary);max-width:100%;white-space:normal;overflow-wrap:anywhere}
    #statbar .sb-sep{color:var(--border-strong)}
    .stat-chip{display:flex;flex-direction:column;align-items:center;gap:1px}
    .stat-chip .sc-val{font-size:15px;font-weight:500;color:var(--text-primary)}
    .stat-chip .sc-lbl{font-size:10px;color:var(--text-muted)}
    .stat-chip.ac .sc-val{color:var(--text-accent)}
    .stat-chip.ac .sc-lbl{color:var(--text-accent)}
    #statbar .ml{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}

    .user-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); background: #fff; border: 0.5px solid var(--border); padding: 3px 12px; border-radius: 20px; cursor: pointer; max-width: 100%; }
    .user-badge span { white-space: normal; overflow-wrap: anywhere; }
    .user-badge:hover { background: var(--bg-accent); border-color: var(--border-accent); }
    .btn-logout { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px; display: flex; align-items: center; }
    .btn-logout:hover { color: var(--text-danger); }

    #shell{display:flex;flex:1;min-height:0;position:relative;overflow:hidden;}
    #sidebar{width:200px;flex-shrink:0;border-right:0.5px solid var(--border);padding:10px 8px;display:flex;flex-direction:column;gap:3px;transition:width .2s;background:#fff}
    
    /* ✨ 変更点: 作品リスト（左サイドバー）の中身だけスクロールさせる */
    #sbList { flex: 1; overflow-y: auto; min-height: 0; }
    
    #sidebar.closed{width:40px;overflow:hidden}
    .sb-toggle{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--radius);cursor:pointer;color:var(--text-secondary);border:0.5px solid var(--border);background:none;margin-bottom:6px;flex-shrink:0}
    .sb-toggle:hover{background:var(--surface-1);color:var(--text-primary)}
    .sb-head{font-size:10px;font-weight:500;color:var(--text-muted);letter-spacing:.05em;padding:3px 6px;margin-bottom:1px;white-space:nowrap}
    .sb-item{display:flex;align-items:center;gap:6px;padding:6px 7px;border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text-secondary);border:0.5px solid transparent;position:relative}
    .sb-item:hover{background:var(--surface-1);color:var(--text-primary)}
    .sb-item.active{background:var(--surface-1);color:var(--text-primary);border-color:var(--border)}
    .sb-item .sb-icon{font-size:14px;flex-shrink:0}
    .sb-item.script-item .sb-icon{color:#D85A30}
    .sb-item.script-item{color:#D85A30}
    .sb-item.script-item.active{background:#FAECE7;border-color:#F0997B}
    .sb-item.script-item:hover{background:#FAECE7}
    .sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
    .sb-dots{font-size:14px;color:var(--text-muted);padding:2px 3px;border-radius:3px;flex-shrink:0;line-height:1}
    .sb-dots:hover{background:var(--border);color:var(--text-primary)}
    .sb-new{display:flex;align-items:center;gap:5px;padding:6px 7px;border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text-accent);border:0.5px dashed var(--border-accent);margin-top:5px;white-space:nowrap;flex-shrink:0;}
    .sb-new:hover{background:var(--bg-accent)}
    .sb-divider{height:0.5px;background:var(--border);margin:5px 3px;flex-shrink:0;}
    #sidebar.closed .sb-head,#sidebar.closed .sb-name,#sidebar.closed .sb-dots,#sidebar.closed .sb-new span,#sidebar.closed .sb-divider{display:none}
    #sidebar.closed .sb-new{padding:6px;justify-content:center}
    #sidebar.closed .sb-item{justify-content:center;padding:6px}

    #ctxMenu{position:absolute;background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);padding:4px;z-index:200;min-width:150px;display:none}
    #ctxMenu.open{display:block}
    .ctx-item{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:13px;color:var(--text-primary);border-radius:4px;cursor:pointer}
    .ctx-item:hover{background:var(--surface-1)}
    .ctx-item.danger{color:var(--text-danger)}
    .ctx-item.danger:hover{background:var(--bg-danger)}

    #main{flex:1;min-width:0;padding:1rem 1.25rem;overflow-y:auto}
    .modal-overlay{background:rgba(0,0,0,.4);border-radius:12px;padding:2rem 1rem;display:flex;align-items:center;justify-content:center;min-height:340px;margin-bottom:1rem}
    .modal-box{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1.5rem;width:100%;max-width:380px}
    .modal-box h3{font-size:16px;font-weight:500;color:var(--text-primary);margin-bottom:4px}
    .modal-sub{font-size:13px;color:var(--text-secondary);margin-bottom:1.25rem}
    .mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
    .mode-card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer}
    .mode-card:hover,.mode-card.sel{border-color:var(--border-accent);background:var(--bg-accent)}
    .mode-card .mc-icon{font-size:20px;color:var(--text-accent);margin-bottom:5px}
    .mode-card h4{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:2px}
    .mode-card p{font-size:11px;color:var(--text-secondary);line-height:1.5}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end}
    .rename-box{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;width:100%;max-width:320px}

    .filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:6px 10px;background:var(--surface-1);border-radius:var(--radius);border:0.5px solid var(--border);font-size:12px;color:var(--text-secondary);margin-bottom:.75rem}
    .filter-row label{display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text-primary)}
    .simple-textarea{width:100%;min-height:260px;font-size:14px;line-height:1.8;font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;resize:none;overflow:hidden;outline:none;margin-bottom:.75rem}
    .simple-textarea:focus{border-color:var(--border-accent)}

    .top-bar{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
    .icon-btn{font-size:12px;color:var(--text-muted);background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 9px;cursor:pointer}
    .icon-btn:hover{color:var(--text-primary);border-color:var(--border-strong)}
    .speakers-bar{display:flex;gap:6px;margin-bottom:.6rem;flex-wrap:wrap;align-items:center}
    .speaker-chip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid transparent}
    .speaker-chip.active{border-color:currentColor}
    .speaker-chip:not(.active){opacity:.4}
    .alt-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);margin-bottom:.6rem}

    .line-container{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;transition: opacity 0.2s;position:relative;}
    .line-container.dragging { opacity: 0.4; background: var(--bg-accent); border-radius: var(--radius); }
    .line{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2)}
    .line:hover{border-color:var(--border-strong)}
    .line.stage{background:var(--surface-1);border-style:dashed}

    .line-speaker{font-size:11px;font-weight:600;min-width:65px;padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none;cursor:grab;border-radius:4px;background: rgba(0,0,0,0.03);text-align:center;}
    .line-speaker:active{cursor:grabbing;}
    .line-text{flex:1;font-size:13px;color:var(--text-primary);background:none;border:none;outline:none;resize:none;line-height:1.6;font-family:var(--font-sans);min-height:24px;overflow:hidden;word-break:break-all;white-space:pre-wrap;}
    .line-text::placeholder{color:var(--text-muted)}

    .line-inline-actions{display:flex;gap:4px;align-items:center;padding-left:73px;flex-wrap:wrap}
    .bs{background:var(--surface-1);border:0.5px solid var(--border);cursor:pointer;color:var(--text-secondary);font-size:11px;padding:3px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
    .bs:hover{background:var(--border);color:var(--text-primary)}
    .bs.ac-change{background:var(--bg-accent);border-color:var(--border-accent);color:var(--text-accent);font-weight:500}
    .bs.ac-change:hover{background:#dbeafe}
    .bs.ac-danger{background:var(--bg-danger);border-color:var(--border-danger);color:var(--text-danger);}
    .bs.ac-danger:hover{background:#fca5a5}
    .bs.ac-add{background:#e1f5ee;border-color:#a7f3d0;color:#059669;font-weight:500}
    .bs.ac-add:hover{background:#bbf7d0}
    .bs.ac-proposal{background:#fff7ed;border-color:#fed7aa;color:#ea580c;font-weight:500}
    .bs.ac-proposal:hover{background:#ffedd5}

    .add-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-top:1px dashed var(--border);padding-top:12px;margin-top:12px}
    .act-btn{font-size:12px;border-radius:var(--radius);padding:5px 12px;cursor:pointer;background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-primary)}
    .act-btn:hover{border-color:var(--border-strong)}
    .act-btn.ac{background:none;border-color:var(--border-accent);color:var(--text-accent)}
    .act-btn.ac:hover{background:var(--bg-accent)}

    .setup-wrap{max-width:380px}
    .setup-wrap h3{font-size:16px;font-weight:500;color:var(--text-primary);margin-bottom:4px}
    .setup-sub{font-size:13px;color:var(--text-secondary);margin-bottom:1rem}
    .sp-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
    .sp-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
    .cdots{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
    .cdot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
    .cdot.sel{border-color:var(--text-primary)}
    .rm-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:2px}
    .rm-btn:hover{color:var(--text-primary)}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:340px;gap:10px;color:var(--text-muted);text-align:center}
    .empty .ei{font-size:32px;margin-bottom:4px}
    .empty p{font-size:14px}
    #loading{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:white;padding:5px 10px;border-radius:4px;font-size:11px;display:none;z-index:999;}

    .friend-box { border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; margin-top: 10px; max-height: 150px; overflow-y: auto; text-align: left; }
    .friend-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; padding: 4px 6px; border-bottom: 0.5px solid var(--surface-1); }
    .id-copy-btn { font-size: 10px; padding: 2px 6px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 4px; cursor: pointer; margin-left: 6px;}
    .share-checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 6px 0; border-bottom: 0.5px solid var(--surface-1); cursor: pointer; }

    #proposal-sidebar { position: absolute; top: 0; right: -280px; width: 280px; height: 100%; background: #fff; border-left: 1px solid var(--border); box-shadow: -2px 0 8px rgba(0,0,0,0.05); z-index: 100; display: flex; flex-direction: column; transition: right 0.25s ease; }
    #proposal-sidebar.open { right: 0; }
    .ps-header { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #fff7ed; border-bottom: 0.5px solid var(--border); font-size: 13px; font-weight: 600; color: #ea580c; flex-shrink: 0; }
    .ps-close { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 16px; }
    .ps-content { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
    .prop-card { background: #fff7ed; border: 0.5px solid #fed7aa; border-radius: var(--radius); padding: 8px; display: flex; flex-direction: column; gap: 6px; text-align: left; }
    .prop-meta { font-size: 10px; color: #c2410c; display: flex; justify-content: space-between; font-weight: 500; }
    .prop-text { width: 100%; font-size: 12px; line-height: 1.5; padding: 6px; border-radius: 4px; border: 0.5px solid #fed7aa; outline: none; resize: vertical; font-family: var(--font-sans); }
    .prop-actions { display: flex; gap: 4px; justify-content: flex-end; }
    .badge-prop-count { display: inline-flex; align-items: center; justify-content: center; background: #ea580c; color: white; border-radius: 10px; font-size: 9px; padding: 1px 5px; font-weight: bold; margin-left: 2px; }

    .line.previewing { background: #fffbf5; border-color: #fdba74; border-style: solid; }
    .line.previewing .line-text { color: #9a3412; }
    .preview-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; color: #ea580c; background: #ffedd5; border: 0.5px solid #fed7aa; border-radius: 10px; padding: 2px 8px; }

    .prof-field { display:block; text-align:left; font-size:11px; font-weight:600; color:var(--text-secondary); margin:10px 0 3px; }
    .prof-input { width:100%; padding:7px 9px; border-radius:6px; border:0.5px solid var(--border); outline:none; font-size:13px; font-family:var(--font-sans); }
    .prof-input:focus { border-color:var(--border-accent); }
    textarea.prof-input { resize:vertical; min-height:70px; line-height:1.6; }

    .mailbox-btn { position:relative; display:flex; align-items:center; justify-content:center; background:#fff; border:0.5px solid var(--border); border-radius:20px; padding:4px 10px; cursor:pointer; color:var(--text-secondary); font-size:15px; }
    .mailbox-btn:hover { background:var(--bg-accent); border-color:var(--border-accent); color:var(--text-accent); }
    .mail-badge { position:absolute; top:-5px; right:-4px; background:#ef4444; color:#fff; border-radius:10px; font-size:9px; font-weight:bold; padding:1px 5px; display:none; line-height:1.4; }
    .mail-section { font-size:11px; font-weight:600; color:var(--text-secondary); letter-spacing:.03em; margin:16px 0 4px; text-align:left; }
    .mail-item { display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:12px; padding:8px 6px; border-bottom:0.5px solid var(--surface-1); text-align:left; }
    .mail-item .mi-text { overflow-wrap:anywhere; line-height:1.5; }
    .mail-item .mi-actions { display:flex; gap:4px; flex-shrink:0; }
    .mail-notice { font-size:12px; color:var(--text-secondary); padding:6px; border-bottom:0.5px solid var(--surface-1); text-align:left; overflow-wrap:anywhere; line-height:1.5; }
    .mail-notice .mn-time { font-size:9px; color:var(--text-muted); margin-left:4px; }
    #toastArea { position:fixed; top:12px; right:12px; z-index:1000; display:flex; flex-direction:column; gap:8px; max-width:280px; }
    .toast { background:#111827; color:#fff; font-size:12px; padding:10px 12px; border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.25); line-height:1.5; overflow-wrap:anywhere; animation:toastIn .25s ease; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore as gf, collection as gc, doc as gd, setDoc as gs, getDoc as gg, deleteDoc as gdd, query as gq, where as gw, onSnapshot as gos, or as gor, arrayUnion as gau, writeBatch as gwb } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAglyfa3nsEgyXHWRAHIYeuB2tMOU1F5Ms",
      authDomain: "text-for-m.firebaseapp.com",
      projectId: "text-for-m",
      storageBucket: "text-for-m.firebasestorage.app",
      messagingSenderId: "571493681203",
      appId: "1:571493681203:web:d5b32a76f12e68aa9dfb46",
      measurementId: "G-7SETWS5KG0"
    };

    const app = initializeApp(firebaseConfig);
    const db = gf(app);
    const auth = getAuth(app);
    const scriptsCol = gc(db, "scripts");
    const usersCol = gc(db, "users");
    const requestsCol = gc(db, "friendRequests");
    const sharesCol = gc(db, "shareInvites");

    window.currentUser = null;
    window.userData = null;
    let unsubscribeScripts = null;
    let unsubRequestsIn = null;
    let unsubRequestsOut = null;
    let unsubscribeShares = null;
    let isFirstLoad = true;

    window.inbox = { friendIn: [], friendOut: [], shareIn: [], shareOut: [], notices: [] };
    const processingIds = new Set();
    const notifiedIds = new Set();
    let latestShareDocs = [];

    window.generateUniqueId = function() {
      return Date.now() + Math.floor(Math.random() * 1000);
    };

    window.loginWithGoogle = async function() {
      const provider = new GoogleAuthProvider();
      try { await signInWithPopup(auth, provider); } catch (e) { alert("ログインに失敗しました: " + e.message); }
    };

    window.logout = async function() {
      if(confirm("ログアウトしますか？")) {
        if(unsubscribeScripts) unsubscribeScripts();
        if(unsubRequestsIn) unsubRequestsIn();
        if(unsubRequestsOut) unsubRequestsOut();
        if(unsubscribeShares) unsubscribeShares();
        await signOut(auth);
        location.reload();
      }
    };

    window.registerUserName = async function() {
      const nameInput = document.getElementById("regNameInput");
      const name = nameInput ? nameInput.value.trim() : "";
      if(!name) { alert("名前を入力してください。"); return; }

      document.getElementById('loading').style.display = 'block';
      const uData = { uid: window.currentUser.uid, name: name.slice(0,16), email: window.currentUser.email, friends: [], profile: "", friendApproval: true };
      await gs(gd(usersCol, window.currentUser.uid), uData);
      window.userData = uData;
      document.getElementById('loading').style.display = 'none';
      initAppReady();
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.currentUser = user;
        const userDoc = await gg(gd(usersCol, user.uid));
        if (userDoc.exists()) {
          window.userData = userDoc.data();
          let needsSave = false;
          if(!window.userData.friends){ window.userData.friends = []; needsSave = true; }
          if(window.userData.profile === undefined){ window.userData.profile = ""; needsSave = true; }
          if(needsSave){
            await gs(gd(usersCol, user.uid), JSON.parse(JSON.stringify(window.userData)));
          }
          initAppReady();
        } else {
          renderNameRegistration();
        }
      } else {
        renderLoginView();
      }
    });

    function initAppReady() {
      document.getElementById("auth-view").style.display = "none";
      document.getElementById("app-content").style.display = "flex";
      document.getElementById("userNameLabel").textContent = window.userData.name;

      startInboxListeners();

      const q = gq(scriptsCol, gor(
        gw("userId", "==", window.currentUser.uid),
        gw("sharedWith", "array-contains", window.currentUser.uid)
      ));

      unsubscribeScripts = gos(q, (snapshot) => {
        let imported = [];
        snapshot.forEach(doc => { imported.push(doc.data()); });
        window.projects = imported.sort((a,b) => Number(a.id) - Number(b.id));

        window.renderSidebar();

        if (isFirstLoad) {
          isFirstLoad = false;
          if(!window.activeId && window.projects.length) {
            window.activeId = window.projects[window.projects.length - 1].id;
          }
          if(window.activeId) {
            window.openProject(window.activeId, false);
          } else {
            window.renderEmpty();
          }
        } else if (window.activeId && !window.mailboxOpen && !window.shareModalScriptId) {
          window.openProject(window.activeId, true);
        }

        reconcileShares();
      }, (error) => {
        console.error("Firestore同期エラー:", error);
      });
    }

    function startInboxListeners() {
      const me = window.currentUser.uid;

      unsubRequestsIn = gos(gq(requestsCol, gw("to", "==", me)), async (snap) => {
        const friendIn = [];
        for (const d of snap.docs) {
          const r = d.data();
          if(r.status !== 'pending') continue;
          friendIn.push({ id: d.id, fromName: r.fromName, fromUid: r.from, createdAt: r.createdAt });
          if(!notifiedIds.has(d.id)) {
            notifiedIds.add(d.id);
            window.showToast(`📮 ${r.fromName}さんからフレンド申請が届きました`);
          }
        }
        window.inbox.friendIn = friendIn.sort((a,b) => b.createdAt - a.createdAt);
        window.updateMailBadge();
        window.renderMailboxIfOpen();
      }, (e) => { console.error("受信申請の監視エラー:", e); });

      unsubRequestsOut = gos(gq(requestsCol, gw("from", "==", me)), async (snap) => {
        const friendOut = [];
        for (const d of snap.docs) {
          const r = d.data();
          if(r.status === 'pending') {
            friendOut.push({ id: d.id, toName: r.toName, toUid: r.to, createdAt: r.createdAt });
          } else if(r.status === 'approved') {
            if(processingIds.has(d.id)) continue;
            processingIds.add(d.id);
            try {
              if(!window.userData.friends.some(f => f.uid === r.to)) {
                window.userData.friends.push({ uid: r.to, name: r.toName });
                await gs(gd(usersCol, window.currentUser.uid), JSON.parse(JSON.stringify(window.userData)));
              }
              await gdd(gd(requestsCol, d.id));
              pushNotice(`✅ ${r.toName}さんがフレンド申請を承認しました！`);
              window.showToast(`✅ ${r.toName}さんがフレンド申請を承認しました！`);
            } catch(e) { console.error("承認取り込みエラー:", e); }
            finally { processingIds.delete(d.id); }
          }
        }
        window.inbox.friendOut = friendOut.sort((a,b) => b.createdAt - a.createdAt);
        window.updateMailBadge();
        window.renderMailboxIfOpen();
      }, (e) => { console.error("送信申請の監視エラー:", e); });

      let latestShareIn = [], latestShareOut = [];
      function mergeAndReconcile() {
        latestShareDocs = [...latestShareIn, ...latestShareOut];
        reconcileShares();
      }
      let unsubSharesIn = gos(gq(sharesCol, gw("to", "==", me)), (snap) => {
        latestShareIn = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        mergeAndReconcile();
      }, (e) => { console.error("受信共有招待の監視エラー:", e); });
      let unsubSharesOut = gos(gq(sharesCol, gw("ownerUid", "==", me)), (snap) => {
        latestShareOut = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        mergeAndReconcile();
      }, (e) => { console.error("送信共有招待の監視エラー:", e); });
      
      unsubscribeShares = () => { unsubSharesIn(); unsubSharesOut(); };
    }

    async function reconcileShares() {
      if(!window.currentUser) return;
      const me = window.currentUser.uid;
      const shareIn = [], shareOut = [];

      for (const inv of latestShareDocs) {
        if(inv.status === 'pending') {
          if(inv.to === me) {
            shareIn.push({ id: inv.id, ownerName: inv.ownerName, scriptTitle: inv.scriptTitle, createdAt: inv.createdAt });
            if(!notifiedIds.has(inv.id)) {
              notifiedIds.add(inv.id);
              window.showToast(`📮 ${inv.ownerName}さんから「${inv.scriptTitle}」の共同編集の招待が届きました`);
            }
          } else if(inv.ownerUid === me) {
            shareOut.push({ id: inv.id, toName: inv.toName, scriptTitle: inv.scriptTitle, createdAt: inv.createdAt });
          }
        } else if(inv.status === 'approved' && inv.ownerUid === me) {
          if(processingIds.has(inv.id)) continue;
          processingIds.add(inv.id);
          try {
            await gdd(gd(sharesCol, inv.id));
            pushNotice(`✅ ${inv.toName}さんが「${inv.scriptTitle}」の共同編集をOKしました！`);
            window.showToast(`✅ ${inv.toName}さんが「${inv.scriptTitle}」の共同編集をOKしました！`);
          } catch(e) {
            if(e.code !== 'permission-denied' && e.code !== 'not-found') console.error("招待削除エラー:", e);
          }
          finally { processingIds.delete(inv.id); }
        }
      }

      window.inbox.shareIn = shareIn.sort((a,b)=>b.createdAt-a.createdAt);
      window.inbox.shareOut = shareOut.sort((a,b)=>b.createdAt-a.createdAt);
      window.updateMailBadge();
      window.renderMailboxIfOpen();
      window.refreshShareModalIfOpen();
    }

    function pushNotice(text) {
      window.inbox.notices.unshift({ text: text, at: Date.now(), unread: true });
      window.inbox.notices = window.inbox.notices.slice(0, 20);
      window.updateMailBadge();
      window.renderMailboxIfOpen();
    }

    window.shareInviteMapFor = function(scriptId) {
      const map = {};
      latestShareDocs.forEach(inv => {
        if(inv.ownerUid === window.currentUser.uid && String(inv.scriptId) === String(scriptId) && inv.status === 'pending') {
          map[inv.to] = { id: inv.id };
        }
      });
      return map;
    };

    async function sendFriendAddOrRequest(targetData) {
      const reqId = `${window.currentUser.uid}_${targetData.uid}`;
      const existing = await gg(gd(requestsCol, reqId));
      if(existing.exists()) {
        const st = existing.data().status;
        if(st === 'pending'){ alert(`${targetData.name}さんには申請済みです。メールボックスで確認できます。`); return false; }
        if(st === 'approved'){ alert(`${targetData.name}さんは既に承認済みです。`); return false; }
      }
      await gs(gd(requestsCol, reqId), {
        from: window.currentUser.uid, fromName: window.userData.name,
        to: targetData.uid, toName: targetData.name,
        status: 'pending', createdAt: Date.now()
      });
      return true;
    }

    window.addFriendById = async function() {
      const fId = document.getElementById("friendIdInput") ?
                  document.getElementById("friendIdInput").value.trim() : "";
      if(!fId) return alert("IDを入力してください。");
      if(fId === window.currentUser.uid) return alert("自分のIDは追加できません。");
      if(window.userData.friends.some(f => f.uid === fId)) return alert("既にフレンドに登録されています。");

      const L = document.getElementById('loading');
      if(L) L.style.display = 'block';
      try {
        const targetUserDoc = await gg(gd(usersCol, fId));
        if(!targetUserDoc.exists()){
          alert("指定されたIDのユーザーが見つかりませんでした。");
          return;
        }
        const sent = await sendFriendAddOrRequest(targetUserDoc.data());
        if(sent) {
          window.showToast(`📨 ${targetUserDoc.data().name}さんにフレンド申請を送りました`);
          window.openMailbox();
        }
      } catch(e) {
        console.error("フレンド申請エラー:", e);
        if(e.code === 'permission-denied'){
          alert("エラー: 権限がありません。\nFirestoreルールが正しく設定されているか確認してください。\n\n詳細: " + e.message);
        } else {
          alert("エラーが発生しました: " + e.message);
        }
      } finally {
        if(L) L.style.display = 'none';
      }
    };

    window.approveFriendRequest = async function(reqId) {
      const L = document.getElementById('loading');
      if(L) L.style.display = 'block';
      try {
        const d = await gg(gd(requestsCol, reqId));
        if(!d.exists()){ alert("申請が見つかりませんでした。既に取り消された可能性があります。"); return; }
        const r = d.data();
        
        if(!window.userData.friends.some(f => f.uid === r.from)) {
          window.userData.friends.push({ uid: r.from, name: r.fromName });
          await gs(gd(usersCol, window.currentUser.uid), JSON.parse(JSON.stringify(window.userData)));
        }
        
        await gs(gd(requestsCol, reqId), { status: 'approved' }, { merge: true });
        window.showToast(`✅ ${r.fromName}さんをフレンドに追加しました！`);
      } catch(e) {
        console.error("承認エラー:", e);
        alert("エラーが発生しました: " + e.message);
      } finally {
        if(L) L.style.display = 'none';
      }
    };

    window.rejectFriendRequest = async function(reqId) {
      if(!confirm("この申請を拒否しますか？")) return;
      try { await gdd(gd(requestsCol, reqId)); }
      catch(e) { console.error("拒否エラー:", e); alert("エラー: " + e.message); }
    };

    window.cancelFriendRequest = async function(reqId) {
      if(!confirm("この申請を取り消しますか？")) return;
      try { await gdd(gd(requestsCol, reqId)); }
      catch(e) { console.error("取消エラー:", e); alert("エラー: " + e.message); }
    };

    window.saveProfile = async function() {
      const nameEl = document.getElementById("profNameInput");
      const bioEl = document.getElementById("profBioInput");
      const name = nameEl ? nameEl.value.trim().slice(0,16) : "";
      if(!name) return alert("名前を入力してください。");
      const profile = bioEl ? bioEl.value.slice(0,300) : "";
      document.getElementById('loading').style.display = 'block';
      window.userData.name = name;
      window.userData.profile = profile;
      await gs(gd(usersCol, window.currentUser.uid), JSON.parse(JSON.stringify(window.userData)));
      document.getElementById('loading').style.display = 'none';
      document.getElementById("userNameLabel").textContent = name;
      alert("プロフィールを保存しました！");
      window.openProfileModal();
    };

    window.sendShareInvite = async function(friendUid) {
      const p = window.projects.find(x => String(x.id) === String(window.activeId));
      if(!p) return;
      const f = window.userData.friends.find(x => x.uid === friendUid);
      if(!f) return;
      document.getElementById('loading').style.display = 'block';
      const invId = `${p.id}_${friendUid}`;
      await gs(gd(sharesCol, invId), {
        scriptId: String(p.id), scriptTitle: p.title || '無題',
        ownerUid: window.currentUser.uid, ownerName: window.userData.name,
        to: friendUid, toName: f.name,
        status: 'pending', createdAt: Date.now()
      });
      document.getElementById('loading').style.display = 'none';
      window.showToast(`📨 ${f.name}さんに共有の招待を送りました。相手がOKすると共同編集できます。`);
    };

    window.cancelShareInvite = async function(inviteId) {
      if(!confirm("この招待を取り消しますか？")) return;
      await gdd(gd(sharesCol, inviteId));
    };

    window.unshareFriend = async function(friendUid) {
      const p = window.projects.find(x => String(x.id) === String(window.activeId));
      if(!p || !p.sharedWith) return;
      if(!confirm("この作品の共有を解除しますか？相手は編集できなくなります。")) return;
      try {
        p.sharedWith = p.sharedWith.filter(uid => uid !== friendUid);
        await window.dbSave(p);
        window.refreshShareModalIfOpen();
      } catch(e) {
        if(e.code === 'permission-denied') {
          alert("共有解除にはFirestoreルールへの追加が必要です。\nルールに Pattern C を追加してください（コードのコメントを参照）。");
        } else {
          alert("エラーが発生しました: " + e.message);
        }
        if(!p.sharedWith.includes(friendUid)) p.sharedWith.push(friendUid);
      }
    };

    window.approveShareInvite = async function(inviteId) {
      const L = document.getElementById('loading');
      if(L) L.style.display = 'block';
      try {
        const inv = latestShareDocs.find(d => d.id === inviteId);
        if(!inv || !inv.scriptId) {
          alert("招待情報が見つかりませんでした。既に取り消された可能性があります。"); // invite not found
          return;
        }

        // FIX: Run "set shareInvite to approved" + "add self to sharedWith" in a single
        // writeBatch to avoid a race condition where the owner's onSnapshot listener
        // detects status:'approved' and deletes the shareInvite doc before the
        // sharedWith update reaches the server, causing the Firestore rule check to fail.
        const batch = gwb(db);
        batch.set(gd(sharesCol, inviteId), { status: 'approved' }, { merge: true });
        batch.set(
          gd(scriptsCol, String(inv.scriptId)),
          { sharedWith: gau(window.currentUser.uid) },
          { merge: true }
        );
        await batch.commit();

        // Delete invite after batch commit. Failure is harmless: owner's listener
        // will clean it up as a fallback.
        try { await gdd(gd(sharesCol, inviteId)); } catch(delErr) { /* already deleted - ok */ }

        window.showToast("✅ 共同編集をOKしました！作品一覧に追加されます。");
      } catch(e) {
        console.error("共有招待の承認エラー:", e);
        if(e.code === 'permission-denied'){
          alert("エラー: 権限がありません。Firestoreルールを確認してください。\n" + e.message);
        } else {
          alert("エラーが発生しました: " + e.message);
        }
      } finally {
        if(L) L.style.display = 'none';
      }
    };

    window.declineShareInvite = async function(inviteId) {
      if(!confirm("この共有の招待を断りますか？")) return;
      await gdd(gd(sharesCol, inviteId));
    };

    window.dbSave = async function(p) {
      if(!p || !p.id || !window.currentUser) return;
      const L = document.getElementById('loading');
      if(L) L.style.display = 'block';
      try {
        if(!p.userId) p.userId = window.currentUser.uid;
        if(!p.sharedWith) p.sharedWith = [];
        const cleanData = JSON.parse(JSON.stringify(p));
        await gs(gd(scriptsCol, String(p.id)), cleanData);
      } catch(e) {
        console.error("保存エラー:", e);
        if(e.code === 'permission-denied') alert("保存エラー: 権限がありません。\n" + e.message);
        else throw e;
      } finally {
        if(L) L.style.display = 'none';
      }
    };

    window.dbDelete = async function(id) {
      if(!window.currentUser) return;
      const L = document.getElementById('loading');
      if(L) L.style.display = 'block';
      try {
        await gdd(gd(scriptsCol, String(id)));
      } catch(e) {
        console.error("削除エラー:", e);
      } finally {
        if(L) L.style.display = 'none';
      }
    };

    function renderLoginView() {
      document.getElementById("auth-view").innerHTML = `
        <div class="auth-card">
          <h1>台本・文字数エディタ</h1>
          <p>ご利用にはGoogleアカウントとの連携が必要です</p>
          <button class="btn-google" onclick="loginWithGoogle()">
            <i class="ti ti-brand-google" style="font-size:18px;color:#4285F4"></i>
            Googleアカウントで連携・ログイン
          </button>
        </div>`;
      document.getElementById("auth-view").style.display = "flex";
      document.getElementById("app-content").style.display = "none";
    }

    function renderNameRegistration() {
      document.getElementById("auth-view").innerHTML = `
        <div class="auth-card">
          <h1>新規ユーザー登録</h1>
          <p>アプリ内で表示するお名前を入力してください（16文字まで）</p>
          <input type="text" id="regNameInput" placeholder="例：ユーザーA" maxlength="16" style="width:100%; padding:10px; border-radius:8px; border:0.5px solid var(--border); outline:none; margin-bottom:16px; font-size:14px;">
          <button class="act-btn ac" onclick="registerUserName()" style="width:100%; padding:10px;">登録してはじめる</button>
        </div>`;
      document.getElementById("auth-view").style.display = "flex";
      document.getElementById("app-content").style.display = "none";
    }
  </script>
</head>
<body>

<div id="loading">通信中...</div>
<div id="toastArea"></div>
<div id="auth-view" class="auth-container"></div>

<div id="app-content">
  <h2 class="sr-only">台本・文字数カウンターエディタ</h2>
  <div id="statbar">
    <span class="sb-proj" id="barTitle">—</span>
    <span class="sb-sep">|</span>
    <div class="stat-chip">
      <span class="sc-val" id="barAll">0</span>
      <span class="sc-lbl">全体</span>
    </div>
    <div class="stat-chip ac">
      <span class="sc-val" id="barFlt">0</span>
      <span class="sc-lbl">記号抜き</span>
    </div>
    <div class="ml" id="barActions"></div>

    <button class="mailbox-btn" onclick="openMailbox()" title="メールボックス（申請・招待・お知らせ）">
      <i class="ti ti-mail"></i>
      <span class="mail-badge" id="mailBadge">0</span>
    </button>
    <div class="user-badge" onclick="openProfileModal()" title="マイID確認・フレンド管理">
      <i class="ti ti-user" aria-hidden="true"></i>
      <span id="userNameLabel">—</span>
    </div>
    <button class="btn-logout" onclick="logout()" title="アカウント解除・ログアウト">
      <i class="ti ti-logout"></i>
    </button>
  </div>

  <div id="shell">
    <div id="sidebar">
      <button class="sb-toggle" id="sbToggle" onclick="toggleSidebar()" title="サイドバーを開閉"><i class="ti ti-layout-sidebar-left-collapse" id="sbToggleIcon"></i></button>
      <div class="sb-head">作品</div>
      <div id="sbList"></div>
      <div class="sb-divider"></div>
      <div class="sb-new" onclick="openNewModal()">
        <i class="ti ti-plus" style="font-size:14px"></i>
        <span>新規作品</span>
      </div>
    </div>

    <div id="ctxMenu">
      <div class="ctx-item" id="ctxRename" onclick="ctxAction('rename')"><i class="ti ti-pencil" style="font-size:14px"></i> 名前を変更</div>
      <div class="ctx-item" id="ctxCopy" onclick="ctxAction('copy')"><i class="ti ti-copy" style="font-size:14px"></i> 全文コピー</div>
      <div class="ctx-item" id="ctxShare" onclick="ctxAction('share')"><i class="ti ti-share" style="font-size:14px;color:var(--text-accent)"></i> フレンドと共同編集</div>
      <div class="ctx-item danger" onclick="ctxAction('delete')"><i class="ti ti-trash" style="font-size:14px"></i> 削除</div>
    </div>

    <div id="main"></div>

    <div id="proposal-sidebar">
      <div class="ps-header">
        <span><i class="ti ti-git-pull-request"></i> この行の修正案一覧</span>
        <button class="ps-close" onclick="closeProposalSidebar()"><i class="ti ti-x"></i></button>
      </div>
      <div class="ps-content" id="proposalSidebarContent"></div>
    </div>
  </div>
</div>

<script>
const COLORS=[
  {bg:'#E6F1FB',text:'#185FA5',name:'blue'},
  {bg:'#EEEDFE',text:'#3C3489',name:'purple'},
  {bg:'#E1F5EE',text:'#0F6E56',name:'teal'},
  {bg:'#FAECE7',text:'#993C1D',name:'coral'},
  {bg:'#FAEEDA',text:'#854F0B',name:'amber'},
  {bg:'#FBEAF0',text:'#993556',name:'pink'},
  {bg:'#EAF3DE',text:'#3B6D11',name:'green'},
  {bg:'#F1EFE8',text:'#5F5E5A',name:'gray'},
];
const RE_SP=/[\s\u3000]/g;
const RE_PU=/[。、！？…・〜ー]/g;
const RE_SY=/[!"#$%&'()*+,\-./:;<=>?@[\\\]^_`{|}~]/g;
const RE_BR=/[「」『』【】〔〕〈〉《》（）｛｝()[\]{}<>]/g;

window.projects = [];
window.activeId = null;
let sidebarOpen=true;
let ctxTargetId=null;
let newModalMode='script';
let activeLineProposalId = null;

let saveTimeouts = {};
function triggerSave(p) {
  const key = String(p.id);
  if(saveTimeouts[key]) clearTimeout(saveTimeouts[key]);
  saveTimeouts[key] = setTimeout(() => {
    delete saveTimeouts[key];
    if(window.dbSave) window.dbSave(p);
  }, 800);
}

function eid(id){return document.getElementById(id)}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function truncTitle(s){return s ? (s.length>9?s.slice(0,9)+'…':s) : '無題'}
function applyFilters(t,f){
  let s=t;
  if(!f) return s;
  if(f.space)s=s.replace(RE_SP,'');
  if(f.punct)s=s.replace(RE_PU,'');
  if(f.symbol)s=s.replace(RE_SY,'');
  if(f.bracket)s=s.replace(RE_BR,'');
  return s;
}

function autoResize(ta){
  if (!ta) return;
  ta.style.height='auto';
  ta.style.height=ta.scrollHeight+'px';
}
function autoResizeAll() { document.querySelectorAll('.line-text').forEach(ta => autoResize(ta)); }

function effText(l){
  return l.previewOn ? (l.previewText || '') : (l.text || '');
}

function getProjectText(p){
  if(p.mode==='simple')return p.text||'';
  if(!p.lines)return '';
  return p.lines.map(l=>effText(l)).join('');
}

function updateStatBar(p){
  if(!p){eid('barTitle').textContent='—';eid('barAll').textContent='0';eid('barFlt').textContent='0';eid('barActions').innerHTML='';return;}
  const isShared = p.userId !== window.currentUser.uid;
  eid('barTitle').innerHTML = isShared ? `<i class="ti ti-users" style="color:var(--text-accent);font-size:14px;"></i> ${escH(truncTitle(p.title))}` : escH(truncTitle(p.title));

  const raw=getProjectText(p);
  eid('barAll').textContent=raw.length.toLocaleString();
  eid('barFlt').textContent=applyFilters(raw,p.filters).length.toLocaleString();

  let actionsHtml = `<button class="act-btn ac" onclick="exportText()"><i class="ti ti-file-text"></i> text出力</button>`;
  if(p.mode!=='simple'){
    actionsHtml += `<button class="act-btn ac" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i> Excel出力</button>`;

    actionsHtml += `<button class="act-btn" style="border-color:var(--border-accent);color:var(--text-accent);" onclick="openShareModal()"><i class="ti ti-share"></i> 共有設定</button>`;
  }
  eid('barActions').innerHTML = actionsHtml;
}
